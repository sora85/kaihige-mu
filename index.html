<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>回避ゲーム</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  canvas {
    background: #111;
    display: block;
    margin: 20px auto;
    border: 2px solid white;
  }
</style>
</head>
<body>

<h1>回避ゲーム</h1>
<p>← → キーで移動して落ちてくるブロックを避けろ！</p>
<canvas id="game" width="400" height="600"></canvas>
<p id="score">スコア: 0</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 180, y: 550, w: 40, h: 40 };
let blocks = [];
let score = 0;
let gameOver = false;
let showMessage = false;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function spawnBlock() {
  blocks.push({
    x: Math.random() * 360,
    y: -20,
    w: 40,
    h: 40,
    speed: 2 + Math.random() * 3
  });
}

function update() {
  if (gameOver) return;

  // 移動
  if (keys["ArrowLeft"]) player.x -= 5;
  if (keys["ArrowRight"]) player.x += 5;

  // 壁制限
  player.x = Math.max(0, Math.min(360, player.x));

  // ブロック更新
  blocks.forEach(b => b.y += b.speed);

  // 当たり判定
  blocks.forEach(b => {
    if (
      player.x < b.x + b.w &&
      player.x + player.w > b.x &&
      player.y < b.y + b.h &&
      player.y + player.h > b.y
    ) {
      gameOver = true;
      showGameOver();
    }
  });

  // スコア
  score++;
  document.getElementById("score").textContent = "スコア: " + score;

  // 一定確率で生成
  if (Math.random() < 0.03) spawnBlock();
}

function draw() {
  ctx.clearRect(0, 0, 400, 600);

  // プレイヤー
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // ブロック
  ctx.fillStyle = "red";
  blocks.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // ゲームオーバー表示
  if (showMessage) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText("残念！！", 200, 300);
  }
}
  ctx.clearRect(0, 0, 400, 600);

  // プレイヤー
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // ブロック
  ctx.fillStyle = "red";
  blocks.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
}

function showGameOver() {
  gameOver = true;
  showMessage = true;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
